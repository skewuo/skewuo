apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skewuo-web
  namespace: argocd
spec:
  destination:
    namespace: hyper
    server: https://kubernetes.default.svc
  project: default
  source:
    path: helm
    repoURL: https://github.com/skewuo/skewuo.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
