apiVersion: apps/v1
kind: Deployment
metadata:
  name: skewuo-web
  namespace: hyper
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: skewuo-web
  template:
    metadata:
      labels:
        app: skewuo-web
    spec:
      imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
      - name: web
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 80
        resources:
{{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: skewuo-web
  namespace: hyper
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 80
  selector:
    app: skewuo-web
