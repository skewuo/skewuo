apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skewuo-route
  namespace: hyper
spec:
  parentRefs:
  - name: hyper-gateway
    namespace: hyper
  hostnames:
  - "skewuo.com"
  - "www.skewuo.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: skewuo-web
      port: 80
